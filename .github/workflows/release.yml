name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    # `secrets.*` can't be used directly in `if:`, so surface presence as a bool.
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin ullm

      - name: Package
        run: |
          NAME="ullm-${GITHUB_REF_NAME}-aarch64-apple-darwin"
          mkdir -p "$NAME"
          cp target/release/ullm LICENSE NOTICE README.md "$NAME/"
          tar -czf "${NAME}.tar.gz" "$NAME"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ullm-*-aarch64-apple-darwin.tar.gz
            ullm-*-aarch64-apple-darwin.tar.gz.sha256

      # Bump the Homebrew tap formula to this release. Needs a PAT secret
      # `HOMEBREW_TAP_TOKEN` with write access to nobottomline/homebrew-ullm;
      # without it this step is skipped (update the formula by hand).
      - name: Update Homebrew tap
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="ullm-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          SHA=$(cut -d' ' -f1 "${TARBALL}.sha256")
          URL="https://github.com/nobottomline/ullm/releases/download/${GITHUB_REF_NAME}/${TARBALL}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/nobottomline/homebrew-ullm.git" tap
          F=tap/Formula/ullm.rb
          sed -i '' -E "s|^  version \".*\"|  version \"${VERSION}\"|" "$F"
          sed -i '' -E "s|^  url \".*\"|  url \"${URL}\"|" "$F"
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" "$F"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ullm ${VERSION}"
          git push
